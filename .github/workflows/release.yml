name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

env:
  FLUTTER_VERSION: "3.38.9"

jobs:
  build_android:
    name: Build Android
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Compute version label
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            RAW_VERSION="${GITHUB_REF_NAME}"
          else
            RAW_VERSION="$(awk -F': ' '/^version:/{print $2; exit}' pubspec.yaml)"
          fi
          SANITIZED="$(echo "${RAW_VERSION}" | sed -E 's/^v?//; s/[^0-9.].*$//; s/\.//g')"
          VERSION_LABEL="v${SANITIZED}"
          echo "label=${VERSION_LABEL}" >> "$GITHUB_OUTPUT"

      - name: Build APK
        run: flutter build apk --release

      - name: Rename APK
        shell: bash
        run: |
          cp build/app/outputs/flutter-apk/app-release.apk "Orbit-${{ steps.version.outputs.label }}-Android.apk"

      - name: Upload Android artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android
          path: Orbit-${{ steps.version.outputs.label }}-Android.apk
          if-no-files-found: error

  build_macos:
    name: Build macOS
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Compute version label
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            RAW_VERSION="${GITHUB_REF_NAME}"
          else
            RAW_VERSION="$(awk -F': ' '/^version:/{print $2; exit}' pubspec.yaml)"
          fi
          SANITIZED="$(echo "${RAW_VERSION}" | sed -E 's/^v?//; s/[^0-9.].*$//; s/\.//g')"
          VERSION_LABEL="v${SANITIZED}"
          echo "label=${VERSION_LABEL}" >> "$GITHUB_OUTPUT"

      - name: Build macOS app
        run: flutter build macos --release

      - name: Package macOS app
        run: |
          shopt -s nullglob
          APPS=(build/macos/Build/Products/Release/*.app)
          if [ ${#APPS[@]} -eq 0 ]; then
            echo "No .app bundle found in macOS build output."
            exit 1
          fi
          APP_PATH="${APPS[0]}"
          ditto -c -k --sequesterRsrc --keepParent "$APP_PATH" "build/macos/Build/Products/Release/Orbit-${{ steps.version.outputs.label }}-macOS.zip"

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos
          path: build/macos/Build/Products/Release/Orbit-${{ steps.version.outputs.label }}-macOS.zip
          if-no-files-found: error

  build_windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Enable Windows Desktop
        run: flutter config --enable-windows-desktop

      - name: Install dependencies
        run: flutter pub get

      - name: Compute version label
        id: version
        shell: pwsh
        run: |
          if ("${env:GITHUB_REF_TYPE}" -eq "tag") {
            $rawVersion = "${env:GITHUB_REF_NAME}"
          } else {
            $rawVersion = (Select-String -Path "pubspec.yaml" -Pattern "^version:\s*(.+)$").Matches[0].Groups[1].Value.Trim()
          }
          $base = $rawVersion -replace "^v",""
          $base = $base -replace "[^0-9\.].*$",""
          $digits = $base -replace "\.",""
          $label = "v$digits"
          "label=$label" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Build Windows app
        run: flutter build windows --release

      - name: Package Windows app
        shell: pwsh
        run: |
          Compress-Archive -Path "build/windows/x64/runner/Release/*" -DestinationPath "Orbit-${{ steps.version.outputs.label }}-Windows.zip"

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows
          path: Orbit-${{ steps.version.outputs.label }}-Windows.zip
          if-no-files-found: error

  build_web:
    name: Build Web
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Compute version label
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            RAW_VERSION="${GITHUB_REF_NAME}"
          else
            RAW_VERSION="$(awk -F': ' '/^version:/{print $2; exit}' pubspec.yaml)"
          fi
          SANITIZED="$(echo "${RAW_VERSION}" | sed -E 's/^v?//; s/[^0-9.].*$//; s/\.//g')"
          VERSION_LABEL="v${SANITIZED}"
          echo "label=${VERSION_LABEL}" >> "$GITHUB_OUTPUT"

      - name: Build web bundle
        run: flutter build web --release --base-href /Orbit/

      - name: Package web bundle
        run: |
          cd build/web
          zip -r "../../Orbit-${{ steps.version.outputs.label }}-Web.zip" .

      - name: Upload web artifact
        uses: actions/upload-artifact@v4
        with:
          name: web
          path: Orbit-${{ steps.version.outputs.label }}-Web.zip
          if-no-files-found: error

  create_release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs:
      - build_android
      - build_macos
      - build_windows
      - build_web
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: List release files
        run: ls -R dist

      - name: Publish release and upload files
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/android/Orbit-*-Android.apk
            dist/macos/Orbit-*-macOS.zip
            dist/windows/Orbit-*-Windows.zip
            dist/web/Orbit-*-Web.zip
