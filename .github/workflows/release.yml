name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

env:
  FLUTTER_VERSION: "3.38.9"

jobs:
  build_android:
    name: Build Android
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Compute version label
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            RAW_VERSION="${GITHUB_REF_NAME}"
          else
            RAW_VERSION="$(awk -F': ' '/^version:/{print $2; exit}' pubspec.yaml)"
          fi
          SANITIZED="$(echo "${RAW_VERSION}" | sed -E 's/^v?//; s/[^0-9.].*$//; s/\.//g')"
          VERSION_LABEL="v${SANITIZED}"
          echo "label=${VERSION_LABEL}" >> "$GITHUB_OUTPUT"

      - name: Build APK
        run: flutter build apk --release

      - name: Rename APK
        shell: bash
        run: |
          cp build/app/outputs/flutter-apk/app-release.apk "Orbit-${{ steps.version.outputs.label }}-Android.apk"

      - name: Upload Android artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Orbit-${{ steps.version.outputs.label }}-Android
          path: Orbit-${{ steps.version.outputs.label }}-Android.apk
          if-no-files-found: error

  build_macos:
    name: Build macOS
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Install macOS build tools
        run: brew install automake libtool

      - name: Install dependencies
        run: flutter pub get

      - name: Compute version label
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            RAW_VERSION="${GITHUB_REF_NAME}"
          else
            RAW_VERSION="$(awk -F': ' '/^version:/{print $2; exit}' pubspec.yaml)"
          fi
          SANITIZED="$(echo "${RAW_VERSION}" | sed -E 's/^v?//; s/[^0-9.].*$//; s/\.//g')"
          VERSION_LABEL="v${SANITIZED}"
          echo "label=${VERSION_LABEL}" >> "$GITHUB_OUTPUT"

      - name: Build macOS app
        run: flutter build macos --release

      - name: Package macOS app
        run: |
          shopt -s nullglob
          APPS=(build/macos/Build/Products/Release/*.app)
          if [ ${#APPS[@]} -eq 0 ]; then
            echo "No .app bundle found in macOS build output."
            exit 1
          fi
          APP_PATH="${APPS[0]}"
          ditto -c -k --sequesterRsrc --keepParent "$APP_PATH" "Orbit-${{ steps.version.outputs.label }}-macOS.zip"

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: Orbit-${{ steps.version.outputs.label }}-macOS
          path: Orbit-${{ steps.version.outputs.label }}-macOS.zip
          if-no-files-found: error

  build_windows:
    name: Build Windows
    runs-on: windows-latest
    env:
      PUB_CACHE: C:\PubCache
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Enable Windows long paths
        shell: pwsh
        run: |
          git config --system core.longpaths true
          git config --global core.longpaths true
          New-Item -ItemType Directory -Force -Path "$env:PUB_CACHE" | Out-Null

      - name: Enable Windows Desktop
        run: flutter config --enable-windows-desktop

      - name: Install dependencies
        run: flutter pub get

      - name: Compute version label
        id: version
        shell: pwsh
        run: |
          if ("${env:GITHUB_REF_TYPE}" -eq "tag") {
            $rawVersion = "${env:GITHUB_REF_NAME}"
          } else {
            $rawVersion = (Select-String -Path "pubspec.yaml" -Pattern "^version:\s*(.+)$").Matches[0].Groups[1].Value.Trim()
          }
          $base = $rawVersion -replace "^v",""
          $base = $base -replace "[^0-9\.].*$",""
          $digits = $base -replace "\.",""
          $label = "v$digits"
          "label=$label" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Build Windows app
        run: flutter build windows --release

      - name: Package Windows app
        shell: pwsh
        run: |
          Compress-Archive -Path "build/windows/x64/runner/Release/*" -DestinationPath "Orbit-${{ steps.version.outputs.label }}-Windows.zip"

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: Orbit-${{ steps.version.outputs.label }}-Windows
          path: Orbit-${{ steps.version.outputs.label }}-Windows.zip
          if-no-files-found: error

  create_release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs:
      - build_android
      - build_macos
      - build_windows
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Prepare release assets
        run: |
          cp dist/Orbit-*-Android/Orbit-*-Android.apk .
          cp dist/Orbit-*-macOS/Orbit-*-macOS.zip .
          cp dist/Orbit-*-Windows/Orbit-*-Windows.zip .
          ls -la

      - name: Publish release and upload files
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            Orbit-*-Android.apk
            Orbit-*-macOS.zip
            Orbit-*-Windows.zip
